# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml  –  Connect.Ai  (local dev + staging)
#
#  Usage:
#    1. Copy .env.example  →  .env   and fill in your real API keys
#    2. docker compose up --build
#
#  Services:
#    main-backend       http://localhost:8000
#    dashboard-backend  http://localhost:8001
#    dashboard-frontend http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────
version: "3.8"

services:

  # ── 1. Main AI Voice Backend ──────────────────────────────────────────────
  main-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: bharatkn786/connectai-main-backend:latest
    container_name: connectai-main-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - BASE_URL=${BASE_URL}
    volumes:
      - ./pdf:/app/pdf
      - ./index_storage:/app/index_storage
    restart: unless-stopped

  dashboard-backend:
    build:
      context: ./Dashboard/backend
      dockerfile: Dockerfile
    image: bharatkn786/connectai-dashboard-backend:latest
    container_name: connectai-dashboard-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - main-backend

  # ── 3. Dashboard React Frontend ───────────────────────────────────────────
  dashboard-frontend:
    build:
      context: ./Dashboard/frontend
      dockerfile: Dockerfile
    image: bharatkn786/connectai-dashboard-frontend:latest
    container_name: connectai-dashboard-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - dashboard-backend
